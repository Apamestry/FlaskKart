version: "3.9"

services:

  mysql:

    image: mysql:8.4

    container_name: mysql-flaskkart

    restart: always

    ports:
      - "3307:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: flaskkart

    volumes:
      - mysql_flaskkart_data:/var/lib/mysql

volumes:
  mysql_flaskkart_data: